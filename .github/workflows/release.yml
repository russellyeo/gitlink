name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build universal binary
        run: |
          swift build -c release --arch arm64 --arch x86_64

      - name: Package binary
        run: |
          mkdir -p dist
          cp .build/apple/Products/Release/gitlink dist/
          cd dist
          tar -czf gitlink-${{ github.ref_name }}-macos.tar.gz gitlink
          shasum -a 256 gitlink-${{ github.ref_name }}-macos.tar.gz > gitlink-${{ github.ref_name }}-macos.tar.gz.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/gitlink-${{ github.ref_name }}-macos.tar.gz
            dist/gitlink-${{ github.ref_name }}-macos.tar.gz.sha256

  update-formula:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Wait for release assets
        run: sleep 10

      - name: Get SHA256
        id: sha
        run: |
          curl -sL "https://github.com/russellyeo/gitlink/releases/download/${{ github.ref_name }}/gitlink-${{ github.ref_name }}-macos.tar.gz.sha256" -o checksum.txt
          SHA=$(cut -d ' ' -f 1 checksum.txt)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: gitlink
          homebrew-tap: russellyeo/homebrew-tap
          download-url: https://github.com/russellyeo/gitlink/releases/download/${{ github.ref_name }}/gitlink-${{ github.ref_name }}-macos.tar.gz
          download-sha256: ${{ steps.sha.outputs.sha256 }}
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
